<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccessAI - Live Camera Vision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .camera-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        #video-container {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 4/3;
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #camera.hidden {
            display: none;
        }

        #placeholder {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #666;
        }

        #placeholder svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #capture-btn {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }

        #capture-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,217,255,0.3);
        }

        #permission-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        #permission-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.3);
        }

        .status {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }

        .status.visible {
            display: block;
        }

        .status.info {
            background: rgba(0,217,255,0.1);
            border: 1px solid rgba(0,217,255,0.3);
        }

        .status.success {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
        }

        .status.error {
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
        }

        .result-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #00d9ff;
        }

        #result {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 20px;
            min-height: 150px;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 1rem;
        }

        #result.empty {
            color: #666;
            font-style: italic;
        }

        .task-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .task-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .task-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .task-btn.active {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.1);
        }

        .error-details {
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .controls { flex-direction: column; }
            button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AccessAI Vision</h1>
            <p class="subtitle">Live camera feed with AI-powered accessibility analysis</p>
        </header>

        <div class="camera-section">
            <div id="video-container">
                <video id="camera" autoplay playsinline></video>
                <div id="placeholder">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/>
                    </svg>
                    <p>Camera feed will appear here</p>
                </div>
            </div>

            <div class="controls">
                <button id="permission-btn" onclick="startCamera()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                    </svg>
                    Enable Camera
                </button>
                <button id="capture-btn" onclick="captureAndAnalyze()" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                    </svg>
                    Capture & Analyze
                </button>
            </div>

            <div id="status" class="status"></div>
        </div>

        <div class="result-section">
            <h2>Analysis Results</h2>

            <div class="task-selector">
                <button class="task-btn active" onclick="selectTask('describe')" data-task="describe">Describe</button>
                <button class="task-btn" onclick="selectTask('ocr')" data-task="ocr">Read Text</button>
                <button class="task-btn" onclick="selectTask('detect_objects')" data-task="detect_objects">Objects</button>
            </div>

            <div id="result" class="empty">
                Capture an image to see AI analysis results...
            </div>
        </div>
    </div>

    <script>
        let stream = null;
        let currentTask = 'describe';

        const video = document.getElementById('camera');
        const placeholder = document.getElementById('placeholder');
        const captureBtn = document.getElementById('capture-btn');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('result');

        async function startCamera() {
            try {
                showStatus('Requesting camera access...', 'info');

                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                video.srcObject = stream;
                video.classList.remove('hidden');
                placeholder.style.display = 'none';
                captureBtn.disabled = false;

                showStatus('Camera active! Click "Capture & Analyze" to take a photo.', 'success');
                document.getElementById('permission-btn').style.display = 'none';

            } catch (err) {
                console.error('Camera error:', err);
                showStatus(
                    `Camera access denied. Please enable camera permissions in your browser settings.\n\nError: ${err.message}`,
                    'error'
                );
            }
        }

        function selectTask(task) {
            currentTask = task;

            document.querySelectorAll('.task-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.task === task);
            });

            const taskNames = {
                describe: 'Scene Description',
                ocr: 'Text Extraction (OCR)',
                detect_objects: 'Object Detection'
            };

            console.log(`Task selected: ${taskNames[task]}`);
        }

        async function captureAndAnalyze() {
            if (!stream) {
                showStatus('Please enable camera first!', 'error');
                return;
            }

            captureBtn.disabled = true;
            showStatus('Analyzing image...', 'info');
            resultDiv.classList.remove('empty');
            resultDiv.innerHTML = '<span class="loading"></span> Processing with Vertex AI...';

            try {
                // Capture frame from video
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                const imageData = canvas.toDataURL('image/jpeg', 0.8);

                // Send to API
                const response = await fetch('/api/analyze-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: imageData,
                        task: currentTask
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // Display results
                displayResult(data);
                showStatus('Analysis complete!', 'success');

            } catch (err) {
                console.error('Analysis error:', err);
                showStatus(`Analysis failed: ${err.message}`, 'error');
                resultDiv.innerHTML = `<span style="color: #ff4757;">Error: ${err.message}</span>`;

                if (err.message.includes('Vertex AI')) {
                    resultDiv.innerHTML += `
                        <div class="error-details">
                            <strong>To fix this:</strong><br>
                            1. Ensure GOOGLE_CLOUD_PROJECT is set in .env<br>
                            2. Ensure GOOGLE_CLOUD_LOCATION is set<br>
                            3. Run: gcloud auth application-default login<br>
                            4. Enable Vertex AI API in GCP Console
                        </div>
                    `;
                }
            } finally {
                captureBtn.disabled = false;
            }
        }

        function displayResult(data) {
            let output = '';

            switch (currentTask) {
                case 'describe':
                    output = formatDescription(data.description);
                    break;
                case 'ocr':
                    output = formatOCR(data.text);
                    break;
                case 'detect_objects':
                    output = formatObjects(data.objects);
                    break;
                default:
                    output = JSON.stringify(data, null, 2);
            }

            resultDiv.innerHTML = output;
        }

        function formatDescription(text) {
            return `<div class="result-content">
                <h3 style="color: #00d9ff; margin-bottom: 15px;">Scene Description</h3>
                ${text}
            </div>`;
        }

        function formatOCR(text) {
            const hasText = text && text !== 'No text detected';
            return `<div class="result-content">
                <h3 style="color: #00ff88; margin-bottom: 15px;">Extracted Text</h3>
                <pre style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; overflow-x: auto;">${hasText ? text : 'No text detected in image'}</pre>
            </div>`;
        }

        function formatObjects(objects) {
            if (!objects || objects.length === 0) {
                return '<div class="result-content"><p>No objects detected</p></div>';
            }

            const list = objects.map(obj => `
                <div style="padding: 10px; margin: 5px 0; background: rgba(0,0,0,0.2); border-radius: 5px;">
                    <strong style="color: #00d9ff;">${obj.name}</strong>
                    <span style="color: #888; margin-left: 10px;">- ${obj.location}</span>
                </div>
            `).join('');

            return `<div class="result-content">
                <h3 style="color: #ff6b6b; margin-bottom: 15px;">Objects Detected (${objects.length})</h3>
                ${list}
            </div>`;
        }

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status visible ${type}`;

            // Auto-hide info messages after 5 seconds
            if (type === 'info' && !message.includes('...')) {
                setTimeout(() => {
                    statusDiv.classList.remove('visible');
                }, 5000);
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.target.matches('button')) {
                e.preventDefault();
                if (!captureBtn.disabled) captureAndAnalyze();
            }
        });
    </script>
</body>
</html>
